<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Checkout — Maison de Parfum</title>
  <link rel="stylesheet" href="style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet"/>
  <!-- Stripe.js for real payments -->
  <script src="https://js.stripe.com/v3/"></script>
</head>
<body>

  <nav class="navbar">
    <a href="index.html" class="logo">✦ Maison de Parfum</a>
  </nav>

  <div class="checkout-page">
    <div class="checkout-form-side">
      <h2>Checkout</h2>

      <div class="checkout-section">
        <h3>Contact Information</h3>
        <input type="email" id="email" placeholder="Email address" class="form-input"/>
      </div>

      <div class="checkout-section">
        <h3>Shipping Address</h3>
        <div class="form-row">
          <input type="text" id="firstName" placeholder="First name" class="form-input"/>
          <input type="text" id="lastName" placeholder="Last name" class="form-input"/>
        </div>
        <input type="text" id="address" placeholder="Street address" class="form-input"/>
        <div class="form-row">
          <input type="text" id="city" placeholder="City" class="form-input"/>
          <input type="text" id="zip" placeholder="ZIP code" class="form-input half"/>
        </div>
        <input type="text" id="country" placeholder="Country" class="form-input"/>
      </div>

      <div class="checkout-section">
        <h3>Payment</h3>
        <div class="stripe-notice">
          <p>💳 Secure payment powered by Stripe</p>
          <p class="stripe-sub">Add your Stripe publishable key in checkout.html to enable real payments</p>
        </div>
        <div id="card-element" class="card-element-box">
          <!-- Stripe Card Element mounts here -->
          <p style="color:#B0A898; font-size:13px; text-align:center; padding:20px 0">
            Enter your Stripe key to activate payments
          </p>
        </div>
        <div id="card-errors" style="color:#c0392b; font-size:13px; margin-top:8px"></div>
      </div>

      <button class="btn-primary full-width" id="payBtn" onclick="placeOrder()">
        Place Order — $<span id="payTotal">0</span>
      </button>
    </div>

    <div class="checkout-summary-side">
      <h3>Your Order</h3>
      <div id="orderItems"></div>
      <div class="summary-row" style="margin-top:16px"><span>Subtotal</span><span id="orderSubtotal">$0</span></div>
      <div class="summary-row"><span>Shipping</span><span>Free</span></div>
      <div class="summary-row total"><span>Total</span><span id="orderTotal">$0</span></div>
    </div>
  </div>

  <script src="shop.js"></script>
  <script>
    const cart = getCart();
    if (cart.length === 0) location.href = 'shop.html';

    // Render order summary
    const itemsEl = document.getElementById('orderItems');
    cart.forEach(item => {
      const p = PRODUCTS.find(x => x.id === item.id);
      itemsEl.innerHTML += `
        <div class="order-item">
          <span>${p.emoji} ${p.name} × ${item.qty}</span>
          <span>$${p.price * item.qty}</span>
        </div>`;
    });
    const total = getCartTotal();
    document.getElementById('orderSubtotal').textContent = '$' + total;
    document.getElementById('orderTotal').textContent = '$' + total;
    document.getElementById('payTotal').textContent = total;

    // ── Stripe integration ──────────────────────────────────
    // Replace with your real Stripe publishable key from stripe.com/dashboard
    const STRIPE_KEY = 'pk_test_YOUR_STRIPE_KEY_HERE';

    let stripe, cardElement;
    if (STRIPE_KEY !== 'pk_test_YOUR_STRIPE_KEY_HERE') {
      stripe = Stripe(STRIPE_KEY);
      const elements = stripe.elements();
      cardElement = elements.create('card', {
        style: {
          base: { fontFamily: 'Jost, sans-serif', fontSize: '15px', color: '#1C1A17' }
        }
      });
      cardElement.mount('#card-element');
    }

    async function placeOrder() {
      const email = document.getElementById('email').value;
      const name = document.getElementById('firstName').value + ' ' + document.getElementById('lastName').value;

      if (!email || !name.trim()) {
        alert('Please fill in your name and email.');
        return;
      }

      if (!stripe) {
        // Demo mode — no Stripe key yet
        localStorage.removeItem('pf_cart');
        location.href = 'index.html?success=1';
        return;
      }

      // With Stripe — you would call your backend to create a PaymentIntent
      // then confirm it here. See stripe.com/docs for full implementation.
      alert('Add your Stripe key to enable real payments!');
    }

    // Show success message if redirected back
    if (new URLSearchParams(location.search).get('success')) {
      document.body.innerHTML = `
        <div style="text-align:center;padding:100px 24px;font-family:Jost,sans-serif">
          <div style="font-size:48px;margin-bottom:24px">✓</div>
          <h2 style="font-family:Cormorant Garamond,serif;font-size:36px;margin-bottom:16px">Order Placed!</h2>
          <p style="color:#7A7060;margin-bottom:32px">Thank you for your order. Confirmation sent to your email.</p>
          <a href="index.html" style="background:#1C1A17;color:#F5EED8;padding:14px 32px;border-radius:40px;text-decoration:none">Back to Home</a>
        </div>`;
    }
  </script>
</body>
</html>
