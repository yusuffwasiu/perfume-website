<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Shop — Maison de Parfum</title>
  <link rel="stylesheet" href="style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet"/>
</head>
<body>

  <nav class="navbar">
    <a href="index.html" class="logo">✦ Maison de Parfum</a>
    <div class="nav-links">
      <a href="shop.html" class="active">Shop</a>
      <a href="advisor.html">AI Advisor</a>
      <a href="#">About</a>
    </div>
    <div class="nav-actions">
      <a href="advisor.html" class="nav-advisor">✦ Find My Scent</a>
      <a href="cart.html" class="cart-icon">🛍 <span class="cart-count" id="cartCount">0</span></a>
    </div>
  </nav>

  <div class="page-header">
    <h1>The Collection</h1>
    <p>Six masterfully crafted fragrances for every mood and moment</p>
  </div>

  <!-- FILTERS -->
  <div class="filters">
    <button class="filter-btn active" onclick="filterProducts('all', this)">All</button>
    <button class="filter-btn" onclick="filterProducts('Floral', this)">Floral</button>
    <button class="filter-btn" onclick="filterProducts('Fresh', this)">Fresh</button>
    <button class="filter-btn" onclick="filterProducts('Woody', this)">Woody</button>
    <button class="filter-btn" onclick="filterProducts('Oriental', this)">Oriental</button>
  </div>

  <div class="products-grid wide" id="shopGrid"></div>

  <footer class="footer">
    <div class="logo">✦ Maison de Parfum</div>
    <p>© 2025 Maison de Parfum. All rights reserved.</p>
  </footer>

  <script src="shop.js"></script>
  <script>
    window.PERFUME_API_URL = '/api/chat';
    function renderProducts(list) {
      const grid = document.getElementById('shopGrid');
      grid.innerHTML = list.map(p => `
        <div class="product-card" onclick="location.href='product.html?id=${p.id}'">
          <div class="product-img">${p.emoji}</div>
          <div class="product-info">
            <p class="product-family">${p.family}</p>
            <h3 class="product-name">${p.name}</h3>
            <p class="product-desc">${p.tagline}</p>
            <div class="product-footer">
              <span class="product-price">$${p.price}</span>
              <button class="btn-add" onclick="event.stopPropagation(); addToCart(${p.id})">Add to Cart</button>
            </div>
          </div>
        </div>
      `).join('');
    }

    function filterProducts(keyword, btn) {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const filtered = keyword === 'all' ? PRODUCTS : PRODUCTS.filter(p => p.family.includes(keyword));
      renderProducts(filtered);
    }

    renderProducts(PRODUCTS);
    updateCartCount();
  </script>
  <script src="widget.js"></script>
</body>
</html>
